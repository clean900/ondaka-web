<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarregar o ONDAKA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            background: radial-gradient(at top, #1a0b2e 0%, #0a0a0a 55%);
            color: #fff;
        }
        .wrap { max-width: 26rem; width: 100%; text-align: center; }
        .logo {
            font-size: 1.6rem; font-weight: 800; letter-spacing: .12em; margin-bottom: 2rem;
            background: linear-gradient(90deg, #00D4FF, #A855F7, #EC4899);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .card {
            border: 1px solid rgba(255,255,255,.1); border-radius: 1.25rem; padding: 2rem 1.75rem;
            background: rgba(20,20,40,.6); backdrop-filter: blur(10px);
        }
        h1 { font-size: 1.5rem; margin-bottom: .6rem; }
        .sub { font-size: .9rem; color: rgba(255,255,255,.6); line-height: 1.6; margin-bottom: 1.5rem; }
        .qr { width: 200px; height: 200px; background: #fff; border-radius: .9rem; padding: .75rem; margin: 0 auto 1.5rem; }
        .qr img { width: 100%; height: 100%; display: block; }
        .badges { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
        @media (max-width: 380px) { .badges { grid-template-columns: 1fr; } }
        .badge {
            display: flex; align-items: center; gap: .75rem; text-decoration: none;
            border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.05);
            border-radius: .75rem; padding: .7rem 1rem; transition: background .15s;
        }
        .badge:hover { background: rgba(255,255,255,.1); }
        .badge svg { width: 26px; height: 26px; flex-shrink: 0; }
        .badge .t { text-align: left; line-height: 1.15; }
        .badge .t small { display: block; font-size: .62rem; text-transform: uppercase; letter-spacing: .05em; color: rgba(255,255,255,.5); }
        .badge .t span { font-size: .9rem; font-weight: 600; color: #fff; }
        .foot { font-size: .72rem; color: rgba(255,255,255,.4); margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">✨ ONDAKA</div>
        <div class="card">
            <h1>Descarregar o ONDAKA</h1>
            <p class="sub">Aponta a câmara do telemóvel para o código<br>ou escolhe a tua loja.</p>

            <div class="qr">
                <img src="/img/ondaka-app-qr.svg" alt="QR para descarregar o ONDAKA">
            </div>

            <div class="badges">
                <a class="badge" href="https://play.google.com/store/apps/details?id=ao.ondaka.ondaka_app" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" fill="#fff" aria-hidden="true"><path d="M22.018 13.298l-3.919 2.218-3.515-3.493 3.543-3.521 3.891 2.202a1.49 1.49 0 0 1 0 2.594zM1.337.924a1.486 1.486 0 0 0-.112.568v21.017c0 .217.045.419.124.6l11.155-11.087L1.337.924zm12.207 10.065l3.258-3.238L3.45.195a1.466 1.466 0 0 0-.946-.179l11.04 10.973zm0 2.067l-11 10.933c.298.036.612-.016.906-.183l13.324-7.54-3.23-3.21z"/></svg>
                    <div class="t"><small>Disponível no</small><span>Google Play</span></div>
                </a>
                <a class="badge" href="https://apps.apple.com/app/id6782891593" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" fill="#fff" aria-hidden="true"><path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.036-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z"/></svg>
                    <div class="t"><small>Descarregar na</small><span>App Store</span></div>
                </a>
            </div>
        </div>
        <p class="foot">© ONDAKA · Soluções Simples, Lda</p>
    </div>
</body>
</html>
